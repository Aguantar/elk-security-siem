# 실제 값은 inventory.ini(gitignore). 이 파일을 복사해 채우세요.
[elk_server]
oracle ansible_host=<ORACLE_PUBLIC_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/<YOUR_KEY> es_host=localhost host_name=oracle

[log_shippers]
oracle
minipc ansible_connection=local ansible_user=<USER> es_host=<WG_ORACLE_IP> host_name=minipc

[all:vars]
ansible_python_interpreter=/usr/bin/python3
es_version=8.18.1
wg_ip=<WG_ORACLE_IP>
kibana_domain=kibana.example.com
# ansible-vault로 관리할 것 (Kibana Alerting 필수)
kibana_encryption_key=CHANGEME_USE_ANSIBLE_VAULT
kibana_system_password=CHANGEME_USE_ANSIBLE_VAULT
es_username=elastic
es_password=CHANGEME_USE_ANSIBLE_VAULT
